name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-huggingface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote add hf https://SHAFISK17:$HF_TOKEN@huggingface.co/spaces/SHAFISK17/sense-backend || true
          # Sense is a root-level repo, so we perform a direct force push to synchronize with HF Spaces
          git push --force hf main:refs/heads/main
